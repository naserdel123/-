<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - متجري</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>
    <link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css">
</head>
<body>
    <div class="cursor-glow"></div>
    
    <nav class="navbar glass">
        <div class="nav-brand">
            <span class="logo-bounce">🛒</span>
            <span class="brand-text">متجري</span>
        </div>
        <div class="nav-user">
            <div class="user-avatar" id="userAvatar"></div>
            <span id="userEmail"></span>
            <button onclick="logout()" class="btn-logout magnetic">
                <span>خروج</span>
                <div class="btn-fill"></div>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="hero-section">
            <h2 class="reveal-text">اكتشف منتجاتنا المميزة</h2>
            <p class="reveal-text delay">أفضل المنتجات بأفضل الأسعار</p>
        </div>

        <div class="header-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج..." onkeyup="searchProducts()">
                <span class="search-icon">🔍</span>
            </div>
            
            <button id="addBtn" class="btn-add hidden magnetic" onclick="goToAdmin()">
                <span class="plus-icon">+</span>
                <span>إضافة منتج</span>
                <div class="btn-fill"></div>
            </button>
        </div>

        <div id="productsGrid" class="products-grid">
            <div class="loading-skeleton">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
    </main>

    <div id="paymentModal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close magnetic" onclick="closePayment()">&times;</span>
            <h3>إتمام عملية الشراء</h3>
            <div id="paymentForm"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/payment.js"></script>
    <script>
        // تأثير المؤشر المضيء
        const cursorGlow = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });
        
        // تأثير المغناطيسية
        document.querySelectorAll('.magnetic').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translate(0, 0)';
            });
        });
    </script>
</body>
</html>
