<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - متجري</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Moyasar Payment -->
    <script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>
    <link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">متجري</div>
        <div class="nav-user">
            <span id="userEmail"></span>
            <button onclick="logout()" class="btn-logout">خروج</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="header-section">
            <h2>المنتجات المتاحة</h2>
            <!-- زر الإضافة يظهر فقط للأدمن -->
            <button id="addBtn" class="btn-add hidden" onclick="goToAdmin()">
                <span class="plus-icon">+</span>
                إضافة منتج
            </button>
        </div>

        <div id="productsGrid" class="products-grid">
            <!-- المنتجات تظهر هنا -->
        </div>
    </main>

    <!-- نموذج الدفع -->
    <div id="paymentModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closePayment()">&times;</span>
            <h3>إتمام عملية الشراء</h3>
            <div id="paymentForm"></div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/payment.js"></script>
</body>
</html>
