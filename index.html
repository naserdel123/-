<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجري</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body class="auth-page">
    <div class="particles" id="particles"></div>
    
    <div class="auth-container">
        <div class="auth-box">
            <h1>متجري</h1>
            <p>تسجيل الدخول للمتابعة</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                </div>
                
                <button type="submit" id="loginBtn">دخول</button>
            </form>
            
            <div id="errorMessage" style="color: red; margin-top: 10px;"></div>
            
            <div style="margin-top: 20px;">
                <p>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    
    <!-- Login Script -->
    <script>
        console.log("Page loaded");
        
        // التحقق من Firebase
        if (typeof firebase === 'undefined') {
            console.error("Firebase not loaded!");
            document.getElementById('errorMessage').textContent = "خطأ: Firebase لم يتحمل";
        } else {
            console.log("Firebase loaded");
        }
        
        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log("Form submitted");
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            btn.textContent = 'جاري الدخول...';
            btn.disabled = true;
            errorDiv.textContent = '';
            
            console.log("Trying login with:", email);
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    console.log("Login success!", userCredential.user.email);
                    // الانتقال للرئيسية
                    window.location.href = 'home.html';
                })
                .catch((error) => {
                    console.error("Login error:", error);
                    btn.textContent = 'دخول';
                    btn.disabled = false;
                    
                    // رسائل الخطأ بالعربي
                    const errors = {
                        'auth/invalid-email': 'البريد الإلكتروني غير صالح',
                        'auth/user-disabled': 'الحساب معطل',
                        'auth/user-not-found': 'لا يوجد حساب بهذا البريد',
                        'auth/wrong-password': 'كلمة المرور غير صحيحة',
                        'auth/invalid-credential': 'البريد أو كلمة المرور غير صحيحة'
                    };
                    errorDiv.textContent = errors[error.code] || error.message;
                });
        });
    </script>
</body>
</html>
