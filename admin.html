<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة منتج - متجري</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <!-- التحقق من الأدمن قبل تحميل الصفحة -->
    <script>
        const ADMIN_EMAIL = "naseradmmhmd12@gmail.com";
        firebase.auth().onAuthStateChanged((user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                alert('غير مصرح لك بالدخول!');
                window.location.href = 'home.html';
            }
        });
    </script>
</head>
<body>
    <div class="cursor-glow"></div>
    
    <nav class="navbar glass">
        <div class="nav-brand">
            <span class="logo-bounce">⚡</span>
            <span class="brand-text">لوحة التحكم</span>
        </div>
        <button onclick="goHome()" class="btn-back magnetic">
            <span>← العودة للرئيسية</span>
            <div class="btn-fill"></div>
        </button>
    </nav>

    <main class="admin-content">
        <div class="form-container glass" data-tilt>
            <div class="form-header">
                <h2>إضافة منتج جديد</h2>
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <form id="productForm" class="product-form">
                <div class="form-group image-upload-group">
                    <label>صورة المنتج</label>
                    <div class="image-upload" onclick="document.getElementById('productImage').click()">
                        <input type="file" id="productImage" accept="image/*" hidden onchange="previewImage(this)">
                        <div id="imagePreview" class="image-preview">
                            <div class="upload-placeholder">
                                <span class="upload-icon">📷</span>
                                <span>اضغط لاختيار صورة</span>
                                <small>أو اسحب الصورة هنا</small>
                            </div>
                        </div>
                        <div class="image-overlay hidden">
                            <span>تغيير الصورة</span>
                        </div>
                    </div>
                </div>

                <div class="form-group floating">
                    <input type="text" id="productName" placeholder=" " required>
                    <label>اسم المنتج</label>
                    <div class="input-line"></div>
                </div>

                <div class="form-group floating">
                    <input type="number" id="productPrice" placeholder=" " required min="1">
                    <label>السعر (ريال)</label>
                    <div class="input-line"></div>
                </div>

                <div class="form-group floating">
                    <textarea id="productDesc" rows="3" placeholder=" "></textarea>
                    <label>وصف المنتج (اختياري)</label>
                    <div class="input-line"></div>
                </div>

                <button type="submit" class="btn-publish magnetic">
                    <span class="btn-text">نشر المنتج</span>
                    <div class="btn-fill"></div>
                    <div class="spinner hidden"></div>
                    <div class="progress-fill"></div>
                </button>
            </form>

            <div id="successMessage" class="success-message hidden">
                <div class="success-icon">✓</div>
                <span>تم نشر المنتج بنجاح!</span>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="js/firebase-config.js"></script>
    <script>
        const cursorGlow = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });
        
        document.querySelectorAll('.magnetic').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translate(0, 0)';
            });
        });

        const uploadArea = document.querySelector('.image-upload');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('drag-active');
            });
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('drag-active');
            });
        });
        
        uploadArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if(files.length) {
                document.getElementById('productImage').files = files;
                previewImage(document.getElementById('productImage'));
            }
        });

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const overlay = document.querySelector('.image-overlay');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    preview.classList.add('has-image');
                    overlay.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('.btn-publish');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');
            const progressFill = btn.querySelector('.progress-fill');
            const progressBar = document.getElementById('progressBar');
            
            btn.disabled = true;
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            
            try {
                const file = document.getElementById('productImage').files[0];
                const name = document.getElementById('productName').value;
                const price = document.getElementById('productPrice').value;
                const desc = document.getElementById('productDesc').value;

                if (!file) throw new Error('الرجاء اختيار صورة');

                const storageRef = firebase.storage().ref(`products/${Date.now()}_${file.name}`);
                const uploadTask = storageRef.put(file);
                
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        progressFill.style.width = progress + '%';
                        progressBar.style.width = progress + '%';
                    }
                );
                
                await uploadTask;
                const imageUrl = await storageRef.getDownloadURL();

                await firebase.firestore().collection('products').add({
                    name: name,
                    price: parseFloat(price),
                    description: desc,
                    imageUrl: imageUrl,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: firebase.auth().currentUser.email
                });

                document.getElementById('successMessage').classList.remove('hidden');
                e.target.reset();
                document.getElementById('imagePreview').innerHTML = `
                    <div class="upload-placeholder">
                        <span class="upload-icon">📷</span>
                        <span>اضغط لاختيار صورة</span>
                        <small>أو اسحب الصورة هنا</small>
                    </div>
                `;
                document.getElementById('imagePreview').classList.remove('has-image');
                document.querySelector('.image-overlay').classList.add('hidden');
                progressFill.style.width = '0%';
                progressBar.style.width = '0%';
                
                showToast('تم نشر المنتج بنجاح!', 'success');
                
                setTimeout(() => {
                    document.getElementById('successMessage').classList.add('hidden');
                }, 3000);

            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
                btn.disabled = false;
                progressFill.style.width = '0%';
            }
        });

        function goHome() {
            window.location.href = 'home.html';
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
