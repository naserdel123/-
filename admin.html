<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة منتج - متجري</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">لوحة التحكم</div>
        <button onclick="goHome()" class="btn-back">العودة للرئيسية</button>
    </nav>

    <main class="admin-content">
        <div class="form-container">
            <h2>إضافة منتج جديد</h2>
            <form id="productForm" class="product-form">
                <div class="form-group">
                    <label>صورة المنتج</label>
                    <div class="image-upload" onclick="document.getElementById('productImage').click()">
                        <input type="file" id="productImage" accept="image/*" hidden onchange="previewImage(this)">
                        <div id="imagePreview" class="image-preview">
                            <span>اضغط لاختيار صورة</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>اسم المنتج</label>
                    <input type="text" id="productName" placeholder="مثال: iPhone 15 Pro" required>
                </div>

                <div class="form-group">
                    <label>السعر (ريال)</label>
                    <input type="number" id="productPrice" placeholder="مثال: 4500" required min="1">
                </div>

                <div class="form-group">
                    <label>وصف المنتج (اختياري)</label>
                    <textarea id="productDesc" rows="3" placeholder="وصف مختصر للمنتج..."></textarea>
                </div>

                <button type="submit" class="btn-publish">
                    <span class="btn-text">نشر المنتج</span>
                    <span class="loading hidden">جاري النشر...</span>
                </button>
            </form>

            <div id="successMessage" class="success-message hidden">
                ✓ تم نشر المنتج بنجاح!
            </div>
        </div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script>
        // التحقق من صلاحيات الأدمن
        const ADMIN_EMAIL = "admin@example.com"; // غير هذا الإيميل لإيميلك
        
        firebase.auth().onAuthStateChanged((user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                alert("غير مصرح لك بالدخول!");
                window.location.href = 'home.html';
            }
        });

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    preview.classList.add('has-image');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('.btn-publish');
            const btnText = btn.querySelector('.btn-text');
            const loading = btn.querySelector('.loading');
            
            btnText.classList.add('hidden');
            loading.classList.remove('hidden');
            btn.disabled = true;

            try {
                const file = document.getElementById('productImage').files[0];
                const name = document.getElementById('productName').value;
                const price = document.getElementById('productPrice').value;
                const desc = document.getElementById('productDesc').value;

                if (!file) {
                    throw new Error('الرجاء اختيار صورة');
                }

                // رفع الصورة
                const storageRef = firebase.storage().ref(`products/${Date.now()}_${file.name}`);
                await storageRef.put(file);
                const imageUrl = await storageRef.getDownloadURL();

                // حفظ في Firestore
                await firebase.firestore().collection('products').add({
                    name: name,
                    price: parseFloat(price),
                    description: desc,
                    imageUrl: imageUrl,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: firebase.auth().currentUser.email
                });

                document.getElementById('successMessage').classList.remove('hidden');
                e.target.reset();
                document.getElementById('imagePreview').innerHTML = '<span>اضغط لاختيار صورة</span>';
                document.getElementById('imagePreview').classList.remove('has-image');
                
                setTimeout(() => {
                    document.getElementById('successMessage').classList.add('hidden');
                }, 3000);

            } catch (error) {
                alert('خطأ: ' + error.message);
            } finally {
                btnText.classList.remove('hidden');
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        });

        function goHome() {
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
