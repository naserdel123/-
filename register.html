<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - متجري</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="auth-page">
    <div class="particles" id="particles"></div>
    
    <div class="auth-container">
        <div class="auth-box" data-tilt>
            <div class="logo-float">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <span class="logo-icon">✨</span>
            </div>
            
            <h1 class="glitch" data-text="إنشاء حساب">إنشاء حساب</h1>
            <p class="subtitle">سجل الآن وابدأ التسوق</p>
            
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder=" " required>
                    <label for="fullName">الاسم الكامل</label>
                    <div class="input-line"></div>
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-line"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required minlength="6">
                    <label for="password">كلمة المرور</label>
                    <div class="input-line"></div>
                    <span class="strength-meter"></span>
                </div>
                
                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder=" " required>
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <div class="input-line"></div>
                </div>
                
                <button type="submit" class="btn-primary magnetic">
                    <span class="btn-text">إنشاء الحساب</span>
                    <div class="btn-fill"></div>
                    <div class="spinner hidden"></div>
                </button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message hidden"></div>
            
            <div class="auth-footer">
                <div class="divider"><span>أو</span></div>
                <p>لديك حساب بالفعل؟ <a href="index.html" class="link-hover">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // تأثير الجسيمات
        const particles = document.getElementById('particles');
        for(let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particles.appendChild(particle);
        }
        
        // تأثير المغناطيسية
        document.querySelectorAll('.magnetic').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translate(0, 0)';
            });
        });
        
        // التحقق من قوة كلمة المرور
        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const meter = document.querySelector('.strength-meter');
            let strength = 0;
            if(val.length > 5) strength++;
            if(val.match(/[a-z]/) && val.match(/[A-Z]/)) strength++;
            if(val.match(/\d/)) strength++;
            if(val.match(/[^a-zA-Z\d]/)) strength++;
            
            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
            meter.style.width = (val.length * 10) + '%';
            meter.style.background = colors[strength] || colors[0];
        });
        
        // التحقق من حالة تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'home.html';
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const btn = e.target.querySelector('button');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');
            
            btn.disabled = true;
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            
            if (password !== confirmPassword) {
                showError('كلمة المرور غير متطابقة');
                return;
            }
            
            if (password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return userCredential.user.updateProfile({ displayName: fullName });
                })
                .then(() => {
                    successDiv.textContent = 'تم إنشاء الحساب بنجاح! جاري التحويل...';
                    successDiv.classList.remove('hidden');
                    errorDiv.textContent = '';
                })
                .catch((error) => {
                    showError(getErrorMessage(error.code));
                });
                
            function showError(msg) {
                errorDiv.textContent = msg;
                successDiv.classList.add('hidden');
                btn.disabled = false;
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });

        function getErrorMessage(code) {
            const messages = {
                'auth/invalid-email': 'البريد الإلكتروني غير صالح',
                'auth/email-already-in-use': 'البريد مستخدم بالفعل',
                'auth/weak-password': 'كلمة المرور ضعيفة جداً',
                'auth/operation-not-allowed': 'التسجيل معطل حالياً'
            };
            return messages[code] || 'حدث خطأ، حاول مرة أخرى';
        }
    </script>
</body>
</html>
