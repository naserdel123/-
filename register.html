<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - متجري</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <h1>إنشاء حساب جديد</h1>
            <p>سجل الآن وابدأ التسوق</p>
            
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder="الاسم الكامل" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="كلمة المرور" required minlength="6">
                    <small class="hint">6 أحرف على الأقل</small>
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
                </div>
                <button type="submit" class="btn-primary">إنشاء الحساب</button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message hidden"></div>
            
            <div class="auth-footer">
                <p>لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // التحقق من حالة تسجيل الدخول - إذا مسجل يروح للرئيسية
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'home.html';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const btn = e.target.querySelector('button');
            
            // تعطيل الزر أثناء التسجيل
            btn.disabled = true;
            btn.textContent = 'جاري إنشاء الحساب...';
            
            // التحقق من تطابق كلمة المرور
            if (password !== confirmPassword) {
                errorDiv.textContent = 'كلمة المرور غير متطابقة';
                successDiv.classList.add('hidden');
                btn.disabled = false;
                btn.textContent = 'إنشاء الحساب';
                return;
            }
            
            // التحقق من طول كلمة المرور
            if (password.length < 6) {
                errorDiv.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                successDiv.classList.add('hidden');
                btn.disabled = false;
                btn.textContent = 'إنشاء الحساب';
                return;
            }
            
            // إنشاء الحساب
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // تحديث اسم المستخدم
                    return userCredential.user.updateProfile({
                        displayName: fullName
                    });
                })
                .then(() => {
                    successDiv.textContent = 'تم إنشاء الحساب بنجاح! جاري التحويل...';
                    successDiv.classList.remove('hidden');
                    errorDiv.textContent = '';
                    // التوجيه يتم تلقائياً في onAuthStateChanged فوق
                })
                .catch((error) => {
                    errorDiv.textContent = getErrorMessage(error.code);
                    successDiv.classList.add('hidden');
                    btn.disabled = false;
                    btn.textContent = 'إنشاء الحساب';
                });
        });

        function getErrorMessage(code) {
            const messages = {
                'auth/invalid-email': 'البريد الإلكتروني غير صالح',
                'auth/email-already-in-use': 'البريد مستخدم بالفعل',
                'auth/weak-password': 'كلمة المرور ضعيفة جداً',
                'auth/operation-not-allowed': 'التسجيل معطل حالياً'
            };
            return messages[code] || 'حدث خطأ، حاول مرة أخرى';
        }
    </script>
</body>
</html>
